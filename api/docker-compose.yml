services:
  api:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - shelflet-data:/data
    environment:
      - PORT=3001
      - DB_PATH=/data/shelflet.db
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  shelflet-data:
